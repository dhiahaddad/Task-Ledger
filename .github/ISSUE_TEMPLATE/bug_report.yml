name: Bug report
description: Report reproducible incorrect behavior.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve Task Ledger.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Include the expected behavior and what happened instead.
    validations:
      required: true
  - type: dropdown
    id: interface
    attributes:
      label: Interface
      options: [Python library, Typer CLI, PySide6 desktop, Textual TUI]
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Operating system, Python version, and Task Ledger version.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
    validations:
      required: true

