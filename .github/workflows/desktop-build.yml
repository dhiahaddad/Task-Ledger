name: Desktop builds

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.30"
          python-version: "3.12"
      - run: uv sync --locked --extra desktop
      - name: Build native application
        run: uv run pyside6-deploy packaging/desktop/main.py --name TaskLedger --force
      - name: Upload native artifact
        uses: actions/upload-artifact@v6
        with:
          name: task-ledger-${{ runner.os }}-${{ runner.arch }}
          path: |
            TaskLedger.exe
            TaskLedger.bin
            TaskLedger.app
          if-no-files-found: error
